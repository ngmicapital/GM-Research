<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Briefings Archive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:#FEFCF3;
  color:#2D2A23;
  min-height:100vh;
}

/* ── Header ── */
.hdr{
  background:#1E1B16;
  padding:16px 16px 14px;
  position:sticky;top:0;z-index:10;
  border-bottom:2px solid #C97B1A;
}
.hdr-in{
  max-width:660px;margin:0 auto;
  display:flex;align-items:baseline;gap:10px;
}
.hdr h1{
  font-size:1.15rem;font-weight:700;
  color:#F5EDD6;letter-spacing:-0.01em;
}
.hdr-badge{
  font-size:0.7rem;font-weight:600;
  color:#C97B1A;letter-spacing:0.08em;text-transform:uppercase;
}

/* ── Container ── */
.wrap{max-width:660px;margin:0 auto;padding:14px 12px 40px}

.meta{
  font-size:0.75rem;color:#A0917A;
  padding:4px 2px 10px;
}

/* ── Date row ── */
.row{
  background:#fff;
  border:1px solid #E8E0D0;
  border-radius:12px;
  margin-bottom:8px;
  overflow:hidden;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}

.row-hd{
  width:100%;display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 14px;
  background:none;border:none;cursor:pointer;
  text-align:left;
  transition:background .12s;
}
.row-hd:hover{background:#FDF8EE}
.row-hd:active{background:#F7EDCE}

.row-left{display:flex;align-items:baseline;gap:9px}
.row-date{
  font-size:.98rem;font-weight:700;
  color:#2D2A23;font-variant-numeric:tabular-nums;
}
.row-day{font-size:.75rem;color:#A0917A}

.row-right{display:flex;align-items:center;gap:8px}
.pill{
  font-size:.7rem;font-weight:600;
  color:#C97B1A;background:#FEF3DC;
  padding:2px 7px;border-radius:999px;
}
.chev{
  font-size:.95rem;color:#C0B09A;
  transition:transform .2s ease;display:inline-block;
}
.chev.open{transform:rotate(180deg)}

/* ── Panel ── */
.panel{display:none;padding:0 10px 10px}
.panel.open{display:block}

/* ── Card grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:7px;
}
@media(max-width:360px){.grid{grid-template-columns:1fr}}

/* ── Briefing card ── */
.card{
  display:flex;flex-direction:column;
  border:1px solid;border-radius:8px;
  overflow:hidden;text-decoration:none;
  transition:transform .15s,box-shadow .15s;
  min-height:88px;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}
.card--missing{
  opacity:.3;pointer-events:none;
  background:#111 !important;border-color:#2a2a2a !important;
}
.card-bar{height:3px;width:100%;flex-shrink:0}
.card-body{
  flex:1;padding:8px 9px 5px;
  display:flex;flex-direction:column;gap:3px;
}
.card-title{
  font-size:.76rem;font-weight:700;
  line-height:1.2;
}
.card-sub{font-size:.64rem;color:#94a3b8;line-height:1.3}
.card-cta{
  padding:5px 9px 7px;
  font-size:.68rem;font-weight:700;
  letter-spacing:.03em;
}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px}
.empty-h{font-size:1rem;font-weight:600;color:#7a6a55;margin-bottom:8px}
.empty-b{font-size:.82rem;color:#B0A090;line-height:1.5}
.empty-b code{
  font-size:.78rem;background:#F0EAD8;
  padding:1px 5px;border-radius:4px;
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <h1>Briefings Archive</h1>
    <span class="hdr-badge">dc</span>
  </div>
</header>

<div class="wrap">
<div class="empty"><p class="empty-h">No briefings yet</p><p class="empty-b">Files committed to <code>briefings/YYYY-MM-DD/</code> will appear here.</p></div>
</div>

<script>
function tog(date) {
  var panel = document.getElementById('p-' + date);
  var chev  = document.getElementById('c-' + date);
  var btn   = panel.previousElementSibling;
  var open  = panel.classList.toggle('open');
  chev.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
}

// Auto-open today's entry if present
var today = new Date().toISOString().split('T')[0];
if (document.getElementById('p-' + today)) tog(today);
</script>

</body>
</html>
